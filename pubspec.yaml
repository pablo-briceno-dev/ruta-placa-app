name: ruta_placa
description: "Consulta el pico y placa de Colombia y planea tus rutas"
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  flutter_local_notifications: ^21.0.0
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.0
  google_mobile_ads: ^8.0.0
  home_widget: ^0.9.1
  http: ^1.6.0
  intl: ^0.20.2
  package_info_plus: ^10.0.0
  path: ^1.9.1
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  shared_preferences: ^2.5.5
  sqflite: ^2.4.2
  table_calendar: ^3.2.0
  timezone: ^0.11.0
  url_launcher: ^6.3.2
  workmanager: ^0.9.0+3

dev_dependencies:
  build_runner: ^2.13.1
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.7
  flutter_test:
    sdk: flutter

flutter:

  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/icon/
    - assets/splash/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#121212"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"


flutter_native_splash:
  color: "#121212"
  color_dark: "#121212"
  image: assets/splash/splash_logo.png
  image_dark: assets/splash/splash_logo.png
  android_12:
    color: "#121212"
    image: assets/splash/splash_logo.png
    icon_background_color: "#121212"
  fullscreen: false